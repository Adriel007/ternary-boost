# TernaryBoost Pipeline Configuration
# Universal post-training ternarization (1.58-bit) + LoRA KD + INT2 export
#
# Usage:
#   python scripts/colab_test.py --config configs/pipeline_config.yaml

model:
  name_or_path: "microsoft/phi-2"
  dtype: "float16"
  device: "cuda"

output:
  base_dir: "./output"

ternarization:
  pt_bitnet:
    enabled: true
    block_size: 128
    outlier_fraction: 0.01
    lm_head_hessian_steps: 30
    asymmetric: false

lora:
  enabled: true
  rank: 64
  lora_alpha: 16
  steps: 1000
  distill_weight: 0.1
  temperature: 1.5
  learning_rate: 1.0e-4
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "fc1"
    - "fc2"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

export:
  enabled: true
  format: "int2_packed"
  shard_size_mb: 800

evaluation:
  enabled: true
  tasks:
    - wikitext2
    - c4_validation
  max_len: 128

logging:
  wandb:
    enabled: false
    project: "ternary-boost"
